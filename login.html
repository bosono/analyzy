<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bosono — Přihlášení</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1e293b; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo svg { width: 48px; height: 48px; }
  .logo h1 { font-size: 20px; font-weight: 700; margin-top: 12px; color: #f1f5f9; }
  .logo p { font-size: 12px; color: #64748b; margin-top: 4px; }
  label { font-size: 12px; color: #94a3b8; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  input[type=password] {
    width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155;
    border-radius: 8px; color: #f1f5f9; font-size: 15px; outline: none; transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #4f8ef7; }
  button {
    width: 100%; margin-top: 20px; padding: 13px; background: #4f8ef7; color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
  }
  button:hover { background: #3b7de8; }
  .err { color: #f87171; font-size: 12px; margin-top: 10px; text-align: center; display: none; }
  .footer { text-align: center; font-size: 11px; color: #475569; margin-top: 28px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="24" fill="#1e3a5f"/>
      <path d="M14 30 C14 22 20 16 24 16 C28 16 34 22 34 30" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="24" cy="32" rx="6" ry="3" fill="#4f8ef7" opacity=".4"/>
    </svg>
    <h1>Bosono Analytics</h1>
    <p>Interní analytické reporty</p>
  </div>
  <label for="pwd">Přístupové heslo</label>
  <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
  <button onclick="login()">Vstoupit →</button>
  <div class="err" id="err">Nesprávné heslo. Zkus to znovu.</div>
  <div class="footer">Bosono s.r.o. · Pouze pro interní použití</div>
</div>
<script>
const HASH = '95f9b3352eef79da56e7b38a58e0cf056a839b15cf45963b6595ff52226ad0c6';
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function login() {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if (h === HASH) {
    sessionStorage.setItem('bosono_auth', HASH);
    const redir = new URLSearchParams(location.search).get('from') || 'index.html';
    location.href = redir;
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.getElementById('pwd').addEventListener('keydown', e => e.key === 'Enter' && login());
// Already logged in?
if (sessionStorage.getItem('bosono_auth') === HASH) {
  location.href = new URLSearchParams(location.search).get('from') || 'index.html';
}
</script>
</body>
</html>
